services:

  - type: web
    name: mfp
    env: docker
    repo: https://github.com/KevinDj78/streamvix
    dockerfilePath: ./Dockerfile.mfp
    plan: free
    envVars:
      - key: API_PASSWORD
        generateValue: true

  - type: web
    name: streamvix
    env: node
    repo: https://github.com/KevinDj78/streamvix
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: SC_ENABLED
        value: true
      - key: SC_BASE_URL
        value: https://streamingcommunityz.pet
      - key: MFP_URL
        sync: false
      - key: MFP_PSW
        sync: false
      - key: TMDB_API_KEY
        sync: false
