services:
  # --- 1. MediaFlow Proxy (Docker) -----------------------------------------
  - type: web
    name: mfp
    env: docker
    dockerfilePath: ./Dockerfile.mfp
    plan: free
    envVars:
      - key: API_PASSWORD
        generateValue: true       # Render genera una password random

  # --- 2. StreamViX + SC Provider (Node.js) --------------------------------
  - type: web
    name: streamvix
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: SC_ENABLED
        value: true
      - key: SC_BASE_URL
        value: https://streamingcommunityz.pet
      - key: MFP_URL
        sync: false                # impostare dopo deploy: https://mfp.onrender.com
      - key: MFP_PSW
        sync: false                # copiare API_PASSWORD dal servizio mfp
      - key: TMDB_API_KEY
        sync: false                # opzionale
